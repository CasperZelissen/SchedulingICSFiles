<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'timeGridWeek',
    headerToolbar: {
      left: 'title',
      center: 'eventSelector',
      right: 'today prev,next'
    },
    customButtons: {
      eventSelector: {
        click: function() {} // not used
      }
    },
    datesSet: function() {
      injectDropdown(); // re-inject dropdown every time the calendar changes week
    }
  });

  calendar.render();

  let sourcesData = [];

  // Fetch the available sources once
  fetch('./sources.json')
    .then(res => res.json())
    .then(data => {
      sourcesData = data;
      injectDropdown();
      // load first source
      if (data.length > 0) {
        calendar.addEventSource({ url: data[0].file });
      }
    });

  function injectDropdown() {
    const button = document.querySelector('.fc-eventSelector-button');
    if (!button) return;

    // Avoid creating multiple selects
    let select = button.querySelector('select');
    if (!select) {
      select = document.createElement('select');
      button.innerHTML = ''; // clear any text
      button.appendChild(select);

      select.addEventListener('change', function() {
        calendar.removeAllEventSources();
        calendar.addEventSource({ url: select.value });
      });
    }

    // Populate options
    select.innerHTML = '';
    sourcesData.forEach(source => {
      const option = document.createElement('option');
      option.value = source.file;
      option.textContent = source.name;
      select.appendChild(option);
    });
  }
});
    </script>
  </head>

  <body>
    <div id="calendar"></div>
  </body>
</html>
