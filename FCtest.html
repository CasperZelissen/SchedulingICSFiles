<!DOCTYPE html>
<html lang='en'>
  <head>
    <link rel="stylesheet" href="styles.css">
    <meta charset='utf-8' />

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var selector = document.getElementById('eventSelector');
    
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'timeGridWeek',
          events: {
            url: selector.value
          }
        });
    
        calendar.render();
    
        // 🔁 Change event source when dropdown changes
        selector.addEventListener('change', function() {
          calendar.removeAllEventSources(); // remove old source
    
          calendar.addEventSource({
            url: selector.value
          });
        });
      });
    </script>
  </head>

  <body>
      <select id="eventSelector">
        <option value="./fcJson1.json">file 1</option>
        <option value="./fcJson2.json">file 2</option>
      </select>
    <div id='calendar'></div>
  </body>
</html>
