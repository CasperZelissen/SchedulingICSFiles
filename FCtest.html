<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'timeGridWeek',
    headerToolbar: {
      left: 'title',
      center: 'eventSelector', // custom button placeholder
      right: 'today prev,next'
    },
    customButtons: {
      eventSelector: {
        text: '', // keep empty
        click: function() {} // not used
      }
    },
    datesSet: function() {
      injectDropdown();
    }
  });

  calendar.render();

  let sourcesData = [];
  let currentSource = null;

  fetch('./sources.json')
    .then(res => res.json())
    .then(data => {
      sourcesData = data;

      // Load first source automatically
      if (data.length > 0) {
        currentSource = data[0].file;
        calendar.addEventSource({ url: currentSource });
      }

      injectDropdown();
    });

  function injectDropdown() {
    const button = document.querySelector('.fc-eventSelector-button');
    if (!button) return;

    // Check if select already exists
    let select = button.querySelector('select');
    if (!select) {
      select = document.createElement('select');
      select.style.marginLeft = '5px'; // optional spacing
      button.appendChild(select);

      select.addEventListener('change', function() {
        currentSource = select.value;
        calendar.removeAllEventSources();
        calendar.addEventSource({ url: currentSource });
      });
    }

    // Populate options
    select.innerHTML = '';
    sourcesData.forEach(source => {
      const option = document.createElement('option');
      option.value = source.file;
      option.textContent = source.name;
      select.appendChild(option);
    });

    // Restore current selection
    if (currentSource) select.value = currentSource;
  }
});
    </script>
  </head>

  <body>
    <div id="calendar"></div>
  </body>
</html>
