<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');

        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'timeGridWeek',
          headerToolbar: {
            left: 'title',
            center: 'eventSelector', // this is your custom button/dropdown
            right: 'today prev,next'
          },
          customButtons: {
            eventSelector: {
              text: 'Loading...', // temporary text
              click: function() {} // not needed
            }
          }
        });

        calendar.render();

        // Fetch available sources
        fetch('./sources.json')
          .then(res => res.json())
          .then(data => {
            const button = document.querySelector('.fc-eventSelector-button');
            const select = document.createElement('select');

            data.forEach((source, index) => {
              const option = document.createElement('option');
              option.value = source.file;
              option.textContent = source.name;
              select.appendChild(option);

              // Load first source automatically
              if (index === 0) {
                calendar.addEventSource({ url: source.file });
              }
            });

            // Replace button text with dropdown
            button.innerHTML = '';
            button.appendChild(select);

            // Handle dropdown changes
            select.addEventListener('change', function() {
              calendar.removeAllEventSources();
              calendar.addEventSource({ url: select.value });
            });
          });
      });
    </script>
  </head>

  <body>
    <div id="calendar"></div>
  </body>
</html>
